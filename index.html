<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora Lab</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
        }

        header {
            background: #020617;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: #38bdf8;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 40px;
            color: #38bdf8;
        }

        .section {
            padding: 50px 20px;
            text-align: center;
        }

        .btn {
            background: #38bdf8;
            color: black;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
        }

        footer {
            background: #020617;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <h2>Velora Lab</h2>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
    </nav>
</header>

<section class="hero" id="home">
    <h1>Welcome to Velora Lab</h1>
    <p>We build modern websites using HTML, CSS & JavaScript</p>
    <button class="btn" onclick="showMessage()">Click Me</button>
</section>

<section class="section" id="about">
    <h2>About Velora Lab</h2>
    <p>
        Velora Lab is a creative web development team focused on building
        beautiful and responsive websites using HTML, CSS, and JavaScript.
    </p>
</section>

<footer>
    <p>© 2026 Velora Lab | All Rights Reserved</p>
</footer>

<script>
    function showMessage() {
        alert("Welcome to Velora Lab 🚀");
    }
</script>

</body>
</html>
